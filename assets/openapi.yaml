servers:
  - url: https://{host}:{port}/proxy/network
    description: UniFi OS console (network app behind /proxy/network)
    variables:
      host:
        default: unifi.ui.com
      port:
        default: "443"
  - url: https://{host}:{port}
    description: Self-hosted Network controller (direct)
    variables:
      host:
        default: localhost
      port:
        default: "8443"
