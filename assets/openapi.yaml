components:
  schemas:
    Account:
      type: object
      properties:
        _id:
          type: string
        site_id:
          type: string
        attr_hidden:
          type: boolean
        attr_hidden_id:
          type: string
        attr_no_delete:
          type: boolean
        attr_no_edit:
          type: boolean
        filter_ids:
          type: array
          items:
            type: string
        ip:
          type: string
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$|^$"
        name:
          type: string
          pattern: "^[^\"' ]+$"
        networkconf_id:
          type: string
        tunnel_config_type:
          type: string
          pattern: "vpn|802.1x|custom"
        tunnel_medium_type:
          type: integer
        tunnel_type:
          type: integer
        ulp_user_id:
          type: string
        vlan:
          type: integer
        x_password:
          type: string
    BroadcastGroup:
      type: object
      properties:
        _id:
          type: string
        site_id:
          type: string
        attr_hidden:
          type: boolean
        attr_hidden_id:
          type: string
        attr_no_delete:
          type: boolean
        attr_no_edit:
          type: boolean
        member_table:
          type: array
          items:
            type: string
        name:
          type: string
    ChannelPlan:
      type: object
      properties:
        _id:
          type: string
        site_id:
          type: string
        attr_hidden:
          type: boolean
        attr_hidden_id:
          type: string
        attr_no_delete:
          type: boolean
        attr_no_edit:
          type: boolean
        date:
          type: string
          pattern: "^$|^(20[0-9]{2}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])T([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9])Z?$"
        radio_table:
          type: array
          items:
            $ref: '#/components/schemas/ChannelPlanRadioTable'
    ChannelPlanRadioTable:
      type: object
      properties:
        channel:
          type: string
          pattern: "[0-9]|[1][0-4]|16|34|36|38|40|42|44|46|48|52|56|60|64|100|104|108|112|116|120|124|128|132|136|140|144|149|153|157|161|165|183|184|185|187|188|189|192|196|auto"
        device_mac:
          type: string
          pattern: "^([0-9A-Fa-f]{2}:){5}([0-9A-Fa-f]{2})$"
        name:
          type: string
          pattern: "[a-z]*[0-9]*"
        tx_power:
          type: string
          pattern: "[\\d]+|auto"
        tx_power_mode:
          type: string
          pattern: "auto|medium|high|low|custom"
        width:
          type: integer
    Dashboard:
      type: object
      properties:
        _id:
          type: string
        site_id:
          type: string
        attr_hidden:
          type: boolean
        attr_hidden_id:
          type: string
        attr_no_delete:
          type: boolean
        attr_no_edit:
          type: boolean
        controller_version:
          type: string
        desc:
          type: string
        is_public:
          type: boolean
        modules:
          type: array
          items:
            $ref: '#/components/schemas/DashboardModules'
        name:
          type: string
    DashboardModules:
      type: object
      properties:
        config:
          type: string
        id:
          type: string
        module_id:
          type: string
        restrictions:
          type: string
    Device:
      type: object
      properties:
        _id:
          type: string
        site_id:
          type: string
        attr_hidden:
          type: boolean
        attr_hidden_id:
          type: string
        attr_no_delete:
          type: boolean
        attr_no_edit:
          type: boolean
        mac:
          type: string
        adopted:
          type: boolean
        afc_enabled:
          type: boolean
        atf_enabled:
          type: boolean
        bandsteering_mode:
          type: string
          pattern: "off|equal|prefer_5g"
        baresip_auth_user:
          type: string
          pattern: "^\\+?[a-zA-Z0-9_.\\-!~*'()]*"
        baresip_enabled:
          type: boolean
        baresip_extension:
          type: string
          pattern: "^\\+?[a-zA-Z0-9_.\\-!~*'()]*"
        config_network:
          $ref: '#/components/schemas/DeviceConfigNetwork'
        dpi_enabled:
          type: boolean
        disabled:
          type: boolean
        dot1x_fallback_networkconf_id:
          type: string
          pattern: "[\\d\\w]+|"
        dot1x_portctrl_enabled:
          type: boolean
        ether_lighting:
          $ref: '#/components/schemas/DeviceEtherLighting'
        ethernet_overrides:
          type: array
          items:
            $ref: '#/components/schemas/DeviceEthernetOverrides'
        fan_mode_override:
          type: string
          pattern: "default|quiet"
        flowctrl_enabled:
          type: boolean
        gateway_vrrp_mode:
          type: string
          pattern: "primary|secondary"
        gateway_vrrp_priority:
          type: integer
        green_ap_enabled:
          type: boolean
        hardware_offload:
          type: boolean
        heightInMeters:
          type: number
        hostname:
          type: string
          pattern: ".{1,128}"
        jumboframe_enabled:
          type: boolean
        lcm_brightness:
          type: integer
        lcm_brightness_override:
          type: boolean
        lcm_idle_timeout:
          type: integer
        lcm_idle_timeout_override:
          type: boolean
        lcm_night_mode_begins:
          type: string
          pattern: "(^$)|(^(0[1-9])|(1[0-9])|(2[0-3])):([0-5][0-9]$)"
        lcm_night_mode_ends:
          type: string
          pattern: "(^$)|(^(0[1-9])|(1[0-9])|(2[0-3])):([0-5][0-9]$)"
        lcm_orientation_override:
          type: integer
        lcm_settings_restricted_access:
          type: boolean
        lcm_tracker_enabled:
          type: boolean
        lcm_tracker_seed:
          type: string
          pattern: ".{0,50}"
        led_override:
          type: string
          pattern: "default|on|off"
        led_override_color:
          type: string
          pattern: "^#(?:[0-9a-fA-F]{3}){1,2}$"
        led_override_color_brightness:
          type: integer
        locked:
          type: boolean
        lowpfmode_override:
          type: boolean
        lte_apn:
          type: string
          pattern: ".{1,128}"
        lte_auth_type:
          type: string
          pattern: "PAP|CHAP|PAP-CHAP|NONE"
        lte_data_limit_enabled:
          type: boolean
        lte_data_warning_enabled:
          type: boolean
        lte_ext_ant:
          type: boolean
        lte_hard_limit:
          type: integer
        lte_password:
          type: string
        lte_poe:
          type: boolean
        lte_roaming_allowed:
          type: boolean
        lte_sim_pin:
          type: integer
        lte_soft_limit:
          type: integer
        lte_username:
          type: string
        map_id:
          type: string
        mbb_overrides:
          $ref: '#/components/schemas/DeviceMbbOverrides'
        mesh_sta_vap_enabled:
          type: boolean
        mgmt_network_id:
          type: string
          pattern: "[\\d\\w]+"
        model:
          type: string
        name:
          type: string
          pattern: ".{0,128}"
        nut_server:
          $ref: '#/components/schemas/DeviceNutServer'
        outdoor_mode_override:
          type: string
          pattern: "default|on|off"
        outlet_enabled:
          type: boolean
        outlet_overrides:
          type: array
          items:
            $ref: '#/components/schemas/DeviceOutletOverrides'
        outlet_power_cycle_enabled:
          type: boolean
        peer_to_peer_mode:
          type: string
          pattern: "ap|sta"
        poe_mode:
          type: string
          pattern: "auto|pasv24|passthrough|off"
        port_overrides:
          type: array
          items:
            $ref: '#/components/schemas/DevicePortOverrides'
        power_source_ctrl:
          type: string
          pattern: "auto|8023af|8023at|8023bt-type3|8023bt-type4|pasv24|poe-injector|ac|adapter|dc|rps"
        power_source_ctrl_budget:
          type: integer
        power_source_ctrl_enabled:
          type: boolean
