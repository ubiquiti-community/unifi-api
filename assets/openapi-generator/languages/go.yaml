# OpenAPI Generator config — Go API client package.
#
# The Makefile additionally passes:
#   --model-name-mappings @model-name-mappings.cfg   (canonical model names)
#   --name-mappings       @go-name-mappings.cfg      (go-unifi field-name parity)
# so generated struct fields match go-unifi naming (e.g. DHCPDEnabled).
#
# The Makefile generates models separately into clients/go/models using
# go-model.yaml, then generates APIs and supporting files with this config.
generatorName: go
additionalProperties:
  packageName: unifi
  generateInterfaces: true
  enumClassPrefix: true
  withGoMod: true
  isGoSubmodule: false
